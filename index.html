<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Toka Programming Language</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    p.subtitle { color: #94a3b8; margin-bottom: 2.5rem; font-size: 1.1rem; }
    .cards { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 2rem 2.5rem;
      text-align: center;
      text-decoration: none;
      color: #e2e8f0;
      transition: all 0.2s;
      min-width: 200px;
    }
    .card:hover { background: #334155; border-color: #60a5fa; transform: translateY(-2px); }
    .card h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .card p { color: #94a3b8; font-size: 0.95rem; }
    .lang-tag {
      display: inline-block;
      background: #2563eb;
      color: white;
      padding: 0.2rem 0.6rem;
      border-radius: 0.3rem;
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }
    footer { margin-top: 3rem; color: #475569; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>The Toka Programming Language Guide</h1>
  <p class="subtitle">A modern systems programming language for safety, simplicity, and performance</p>
  <div class="cards">
    <a class="card" href="en/">
      <h2>English</h2>
      <p>Read the full guide in English</p>
      <div class="lang-tag">English</div>
    </a>
    <a class="card" href="zh/">
      <h2>中文</h2>
      <p>阅读完整中文指南</p>
      <div class="lang-tag">简体中文</div>
    </a>
  </div>
  <footer>Built with mdBook &middot; Toka v0.9.7</footer>
</body>
</html>
