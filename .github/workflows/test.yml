name: Test Snippets

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-snippets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Book
        uses: actions/checkout@v4

      - name: Checkout Toka Compiler
        uses: actions/checkout@v4
        with:
          repository: 'zhyi-dp/tokalang'
          path: 'tokalang'

      - name: Install CMake & Ninja
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Build Toka Compiler
        working-directory: ./tokalang
        run: |
          mkdir build && cd build
          cmake -G Ninja ..
          ninja

      - name: Test Book Snippets
        run: |
          export PATH="$PWD/tokalang/build/bin:$PATH"
          export TOKA_LIB="$PWD/tokalang/lib"
          python3 scripts/test_book.py
